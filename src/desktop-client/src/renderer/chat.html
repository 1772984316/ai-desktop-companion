<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CSP：只允许本地资源，禁止外部网络 -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <title>nanobot 助手</title>
  <style>
    /* ---- 全局 ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f13;
      --surface:     #1a1a22;
      --surface2:    #23232e;
      --border:      #2e2e3a;
      --accent:      #6c63ff;
      --accent-dim:  #4a43c7;
      --text:        #e8e8f0;
      --text-dim:    #8888a8;
      --user-bubble: #6c63ff;
      --ai-bubble:   #23232e;
      --radius:      14px;
      --font:        'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      overflow: hidden;
    }

    /* ---- 布局 ---- */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ---- 顶栏 ---- */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      user-select: none;
    }
    #topbar .logo { font-size: 18px; }
    #topbar .title { font-weight: 600; font-size: 15px; flex: 1; }
    #status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
      -webkit-app-region: no-drag;
    }
    #status-dot.online   { background: #4caf50; }
    #status-dot.offline  { background: #f44336; }
    #status-dot.starting { background: #ff9800; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #status-label {
      font-size: 12px;
      color: var(--text-dim);
      -webkit-app-region: no-drag;
    }

    /* ---- 启动进度条 ---- */
    #boot-bar {
      height: 3px;
      background: var(--surface);
      overflow: hidden;
      transition: opacity 0.4s;
    }
    #boot-bar.hidden { opacity: 0; pointer-events: none; }
    #boot-progress {
      height: 100%;
      width: 30%;
      background: var(--accent);
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(450%); }
    }

    /* ---- 消息列表 ---- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeIn 0.2s ease;
    }
    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.assistant { flex-direction: row; }
    .msg-row.system { justify-content: center; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity:1; transform:none; } }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      background: var(--surface2);
    }
    .msg-row.user .avatar { background: var(--accent-dim); }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-row.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .bubble {
      background: var(--ai-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .msg-row.system .bubble {
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      border: none;
      padding: 4px 0;
    }

    /* 流式光标 */
    .bubble.streaming::after {
      content: '▋';
      animation: blink 1s step-end infinite;
      margin-left: 2px;
      opacity: 0.7;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ---- 输入区 ---- */
    #input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    #input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-dim); }
    #send-btn:active:not(:disabled) { transform: scale(0.92); }
    #send-btn:disabled { background: #333; cursor: not-allowed; }
    #send-btn svg { fill: #fff; }
  </style>
</head>
<body>
<div id="app">

  <!-- 顶栏 -->
  <div id="topbar">
    <span class="logo">🤖</span>
    <span class="title">nanobot 助手</span>
    <span id="status-dot" class="starting"></span>
    <span id="status-label">正在启动…</span>
    <button id="btn-feishu-setup"
      style="-webkit-app-region:no-drag;margin-left:auto;padding:4px 10px;background:transparent;
             border:1px solid #3a3a5a;color:#8888a8;border-radius:6px;cursor:pointer;font-size:12px;"
      title="配置飞书机器人">⚙️ 飞书</button>
  </div>

  <!-- 启动进度条 -->
  <div id="boot-bar">
    <div id="boot-progress"></div>
  </div>

  <!-- 消息列表 -->
  <div id="messages">
    <div class="msg-row system">
      <div class="bubble">🚀 正在启动 nanobot，请稍候…</div>
    </div>
  </div>

  <!-- 输入区 -->
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="输入消息，Shift+Enter 换行，Enter 发送…"
              disabled></textarea>
    <button id="send-btn" disabled title="发送 (Enter)">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<script>
(function () {
  'use strict';

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');
  const statusLbl  = document.getElementById('status-label');

  let isConnected  = false;
  let isWaiting    = false;
  let streamBubble = null;
  const bootBar    = document.getElementById('boot-bar');

  // ---- 状态管理 ----

  function setConnected(val) {
    isConnected = val;
    if (val) {
      statusDot.className = 'online';
      statusLbl.textContent = '已连接';
      bootBar.classList.add('hidden');
    } else {
      statusDot.className = 'offline';
      statusLbl.textContent = '未连接';
    }
    updateInputState();
  }

  function setProcPhase(phase, message) {
    if (phase === 'starting') {
      statusDot.className = 'starting';
      statusLbl.textContent = message || '正在启动…';
      bootBar.classList.remove('hidden');
    } else if (phase === 'ready') {
      statusDot.className = 'offline';   // ready but ws not yet open
      statusLbl.textContent = '端口就绪，连接中…';
      bootBar.classList.add('hidden');
    } else if (phase === 'error') {
      statusDot.className = 'offline';
      statusLbl.textContent = '启动失败';
      bootBar.classList.add('hidden');
      appendSystem('❌ ' + (message || 'nanobot 启动失败，请检查环境'));
    } else if (phase === 'stopped') {
      statusDot.className = 'offline';
      statusLbl.textContent = '已停止';
    }
  }

  function setWaiting(val) {
    isWaiting = val;
    updateInputState();
  }

  function updateInputState() {
    const enabled = isConnected && !isWaiting;
    inputEl.disabled = !enabled;
    sendBtn.disabled  = !enabled;
    if (enabled) inputEl.focus();
  }

  // ---- 渲染消息 ----

  function appendMessage(role, content, streaming = false) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🧑' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (streaming ? ' streaming' : '');
    bubble.textContent = content;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function appendSystem(text) {
    const row = document.createElement('div');
    row.className = 'msg-row system';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ---- nanobot API 回调 ----

  // 子进程状态（starting / ready / error / stopped）
  window.nanobotAPI.onProcStatus(({ phase, message }) => {
    setProcPhase(phase, message);
  });

  window.nanobotAPI.onStatus(({ connected }) => {
    setConnected(connected);
    if (connected) {
      appendSystem('✅ 已连接到 nanobot');
    } else {
      appendSystem('⚠️ 与 nanobot 断开连接，正在重连…');
      // 如果有流式消息正在进行，标记为中断
      if (streamBubble) {
        streamBubble.classList.remove('streaming');
        streamBubble.textContent += ' [连接中断]';
        streamBubble = null;
        setWaiting(false);
      }
    }
  });

  window.nanobotAPI.onMessage((msg) => {
    if (msg.type === 'error') {
      // 服务端错误
      if (streamBubble) {
        streamBubble.classList.remove('streaming');
        streamBubble = null;
      }
      appendSystem(msg.content || '发生未知错误');
      setWaiting(false);
      return;
    }

    if (msg.partial) {
      // 流式中间块：追加内容
      if (!streamBubble) {
        streamBubble = appendMessage('assistant', '', true);
      }
      streamBubble.textContent += msg.content;
      scrollToBottom();
    } else {
      // 最终回复
      if (streamBubble) {
        // 流式结束：用完整内容替换并去掉光标
        streamBubble.textContent = msg.content;
        streamBubble.classList.remove('streaming');
        streamBubble = null;
      } else {
        // 非流式单次回复
        appendMessage('assistant', msg.content);
      }
      setWaiting(false);
    }
  });

  // ---- 发送逻辑 ----

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !isConnected || isWaiting) return;

    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    setWaiting(true);
    window.nanobotAPI.send(text);
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // 自动高度
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // ---- 飞书配置弹窗入口 ----
  const feishuBtn = document.getElementById('btn-feishu-setup');
  if (feishuBtn) {
    feishuBtn.addEventListener('click', () => {
      window.feishuAPI.openSetup();
    });
  }
})();
</script>
</body>
</html>
